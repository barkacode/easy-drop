version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bobwstudio_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bobwstudio
      POSTGRES_PASSWORD: BlaisePascal
      POSTGRES_DB: bobwstudio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: